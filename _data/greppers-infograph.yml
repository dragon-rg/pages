Badge: "CSP Capstone — SFI Foundation"
Title: "Safety Made Searchable"
Tagline: "SFI Foundation certifies the equipment that keeps 50,000 drivers safe. We rebuilt how inspectors, staff, and fabricators find and use that information."

Problem: "SFI's standards define what keeps drivers alive. The site that held them was a filing cabinet — static pages, no search, and updates that required editing raw HTML. The information existed. Getting to it didn't."

Solution: "Plain-English search, photo-based identification, and an interactive component diagram — built around how inspectors actually work. Staff publish standard changes through a dashboard the same day they happen, no developer required."

Organization: "SFI Foundation"
Team: "Aditya Srivastava, Dhyan Soni, Aaryav Lal"
BackendUrl: "https://greppers-be.opencodingsociety.com/"

FeatureCards:
  - title: "Any Spec, Instantly"
    desc: "Search by name, description, or spec number — the right standard comes up immediately."
  - title: "Identify Equipment by Photo"
    desc: "Photograph a piece of gear at the track and get back its SFI certification number."
  - title: "Browse by Component"
    desc: "An interactive race car diagram maps every component to its certification standard."
  - title: "Staff Control, No Code"
    desc: "Add, edit, or retire certifications through a simple dashboard — no developer required."

Metrics:
