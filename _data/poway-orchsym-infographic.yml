    aboutTitle: "Why This Is More Accessible"

    description: >
      The site adds accessible entry points for patrons, families, and musicians who want
      to hear the orchestra, find the next concert, explore the roster, or decide whether
      to join. Instead of feeling like a lesson or a text archive, the experience now
      feels active, welcoming, and easier to move through.

