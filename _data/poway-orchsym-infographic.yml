Title: "Poway Symphony Orchestra Capstone"
Badge: "Design-Based Research Capstone"

Description: >
  An accessible, color-rich site experience that adds faster paths to concerts,
  tickets, musicians, and joining the orchestra so visitors can discover what
  matters without digging through dense text.

