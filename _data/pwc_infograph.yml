# Poway Woman's Club Capstone Infographic
Title: "Poway Woman's Club — Website Refurbishment"
Description: "A design-based research capstone rebuilding the website of a 65-year-old community nonprofit with member portals, online payments, and a cohesive modern UI."

Status: "In Development"

Team:
  - name: "Evan S"
    role: "Full-Stack / Backend"
    bio: "Built the interactive front-page game, groups system, admin panel backend APIs, and blogging system, plus other backend and management contributions."
  - name: "Maya D"
    role: "Deployment / Frontend"
    bio: "Deployed the site and built the friends and login system, messaging system, and user interaction flows."
  - name: "Cyrus Z"
    role: "Frontend / Integrations"
    bio: "Built the events system and calendar, Google-based login APIs, customizable profile elements, and an ML system that helps users connect."

About:
  who: "We're a team of three students partnering with the Poway Woman's Club — a 501(c)(3) nonprofit founded in 1960 and affiliated with the General Federation of Women's Clubs International."
  what: "We're rebuilding their website from the ground up: a responsive member portal, an interactive event calendar, an online dues payment flow, and an admin dashboard that lets club leaders manage content without touching code."
  why: "The club has served Poway for over six decades through scholarships, art exhibits, library support, and youth leadership programs. Our goal is to make that mission clear to every visitor and remove friction from joining, paying dues, and staying connected between meetings."

Fixes:
  - "Replace the non-functional email link with a working contact form"
  - "Restructure the homepage so the club's mission is visible at a glance"
  - "Unify the color palette and typography for a cohesive look"

