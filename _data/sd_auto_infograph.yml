    description: "SD Auto is a full-stack intelligent routing platform designed to enhance daily commutes in San Diego, California. By combining real-time traffic data, community hazard reporting, and machine learning-driven route optimization, SD Auto helps commuters navigate congestion using smarter tools. The platform features an ML prediction engine built with Scikit-learn that analyzes historical traffic trends, time-of-day patterns, and crowd-sourced hazard data to deliver optimal routes. Built with a Flask/Python backend, Leaflet-based interactive maps, and a TailwindCSS frontend, SD Auto transforms unstructured traffic information into actionable routing intelligence."
